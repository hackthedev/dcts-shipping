# Production Docker Compose
# ⚠️ Build frontend first: cd frontend && npm run build

services:
  # Backend Application (serves built frontend from public/)
  dcts-app:
    image: ghcr.io/hackthedev/dcts-shipping:latest
    depends_on:
      dcts-mariadb:
        condition: service_healthy
      dcts-redis:
        condition: service_started
      dcts-livekit:
        condition: service_started
    environment:
      - DB_HOST=dcts-mariadb
      - DB_USER=dcts
      - DB_PASS=dcts
      - DB_NAME=dcts
      - LIVEKIT_URL=ws://dcts-livekit:7880
      - LIVEKIT_KEY=change_me
      - LIVEKIT_SECRET=change_me
      - DEBUG=false
      - NODE_ENV=production
    restart: unless-stopped
    ports:
      - "2052:2052"
    volumes:
      - ./public:/app/public  # Includes Svelte frontend build
      - ./dcts/sv:/app/sv
      - ./dcts/configs:/app/configs
      - ./dcts/uploads:/app/public/uploads
      - ./dcts/emojis:/app/public/emojis
      - ./dcts/plugins:/app/plugins

  dcts-mariadb:
    image: mariadb:latest
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=1
      - MARIADB_DATABASE=dcts
      - MARIADB_USER=dcts
      - MARIADB_PASSWORD=dcts
    volumes:
      - dcts-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  dcts-redis:
    image: redis:alpine
    volumes:
      - dcts-redis-data:/data

  dcts-livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    depends_on:
      - dcts-redis
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - 7880:7880
      - 7881:7881
      - 7882:7882/udp
      - 3478:3478/udp
      - 5349:5349/tcp

volumes:
  dcts-mariadb-data:
  dcts-redis-data: