<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script
            src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/3.1.1/socket.io.js"
            integrity="sha512-oFOCo2/3DtjrJG4N27BjSLQWoiBv171sK6a+JiWjp/7agxC2nCUP358AqzxkBUb5jX8g6CYLPdSKQTbC0weCwA=="
            crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="/css/themes/default/default.css">
    <link rel="stylesheet" href="/css/mobile/main.css">
    <link rel="stylesheet" href="/css/settings.css">

    <script src="/js/core/MobileUI.js"></script>
    <script src="/js/core/JsonEditor.js"></script>
    <script src="/js/escape.js"></script>
    <script src="/js/core/purify.js"></script>
    <script src="/js/sysmsg.js"></script>
    <script src="/notify.js"></script>
    <script src="/js/prompts.js"></script>
    <script src="/js/core/PermUI.js"></script>
    <script src="/js/core/ChatManager.js"></script>
    <script src="/js/core/UserManager.js"></script>
    <script defer src="/js/core/PoW.js"></script>
    <script src="/js/core/CookieManager.js"></script>
    <script src="../utility.js"></script>
    <script src="../../js/hover.js"></script>
    <script src="settings.js"></script>
    <script src="/plugins/loader.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof loadPlugins === "function") {
                loadPlugins();
            }
        });
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <title>Channel Settings</title>
</head>
<body id="pagebody" style="display: none;">

<script>

    ChatManager.applyThemeOnLoad(UserManager.getTheme(), UserManager.getThemeAccent());
    document.addEventListener("DOMContentLoaded", function() {
        try{
            var channelId = getUrlParams('id');
        }
        catch(e){
            if(channelId == null || isNaN(channelId)){
                console.log("The channel was not found.");
            }
        }
    })

</script>

<style>
    #rolelist {
        min-width: 200px;
    }
</style>

<div id="wrapper" class="settings-wrapper">
    <div id="navigation">

        <div id="nav_settings">
            <h2>Channel Settings</h2>
            <a onclick="this.href = '/settings/channel/?id=' + getUrlParams('id') + '&page=channel-info';">Info</a><br>
            <a onclick="this.href = '/settings/channel/?id=' + getUrlParams('id') + '&page=channel-permissions';">Permissions</a>
            <hr>
        </div>

    </div>

    <a onclick="ChatManager.goBackToChatWindowFromPopup('channelSettings')"><div id="back"></div></a>
    <div id="content">


    </div>
</div>


</body>
</html>
